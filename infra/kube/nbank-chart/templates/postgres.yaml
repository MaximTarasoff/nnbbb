apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        co.elastic.logs/enabled: "true"
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: nbank
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - nbank
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - nbank
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
data:
# Добавьте сюда содержимое ваших SQL-скриптов из ./init-scripts
# Например:
  01-init-db.sql: |
    CREATE TABLE customers
    (
        id         BIGSERIAL PRIMARY KEY,
        username   VARCHAR(15) UNIQUE NOT NULL,
        password   VARCHAR(255)       NOT NULL,
        name       VARCHAR(100),
        role       VARCHAR(10)        NOT NULL CHECK (role IN ('ADMIN', 'USER')),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    -- Create accounts table
    CREATE TABLE accounts
    (
        id             BIGSERIAL PRIMARY KEY,
        account_number VARCHAR(20) UNIQUE          NOT NULL,
        balance        DECIMAL(15, 2) DEFAULT 0.00 NOT NULL,
        customer_id    BIGINT                      NOT NULL REFERENCES customers (id) ON DELETE CASCADE,
        created_at     TIMESTAMP      DEFAULT CURRENT_TIMESTAMP,
        updated_at     TIMESTAMP      DEFAULT CURRENT_TIMESTAMP
    );

    -- Create transactions table
    CREATE TABLE transactions
    (
        id                 BIGSERIAL PRIMARY KEY,
        amount             DECIMAL(15, 2) NOT NULL,
        type               VARCHAR(20)    NOT NULL CHECK (type IN ('DEPOSIT', 'WITHDRAW', 'TRANSFER_IN', 'TRANSFER_OUT')),
        timestamp          TIMESTAMP      NOT NULL,
        account_id         BIGINT         NOT NULL REFERENCES accounts (id) ON DELETE CASCADE,
        related_account_id BIGINT         REFERENCES accounts (id) ON DELETE SET NULL,
        created_at         TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    -- Create indexes for better performance
    CREATE INDEX idx_customers_username ON customers (username);
    CREATE INDEX idx_accounts_customer_id ON accounts (customer_id);
    CREATE INDEX idx_accounts_account_number ON accounts (account_number);
    CREATE INDEX idx_transactions_account_id ON transactions (account_id);
    CREATE INDEX idx_transactions_timestamp ON transactions (timestamp);

    -- Create trigger to update updated_at timestamp
    CREATE
    OR REPLACE FUNCTION update_updated_at_column()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at
    = CURRENT_TIMESTAMP;
    RETURN NEW;
    END;
    $$
    language 'plpgsql';

    CREATE TRIGGER update_customers_updated_at
        BEFORE UPDATE
        ON customers
        FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

    CREATE TRIGGER update_accounts_updated_at
        BEFORE UPDATE
        ON accounts
        FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

